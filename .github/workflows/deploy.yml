name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Let the workflow publish Pages and mint the deployment's OIDC token.
permissions:
  contents: read
  pages: write
  id-token: write

# One deploy at a time.  cancel-in-progress MUST be false (this matches GitHub's
# own Pages starter workflow): cancelling a Pages *deployment* mid-flight leaves
# the deployment record in a bad state, which makes the NEXT run fail at the
# deploy-pages step with "Deployment failed, try again later."  A newer push
# waits for the in-flight one to finish instead of killing it.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24   # match the npm major that writes package-lock.json (npm 11 optionals choke npm 10)
          cache: npm
      - run: npm ci
      - run: npm test
      - run: npm run build
      # enablement: true turns Pages on for the repo on the first run, so no
      # manual Settings → Pages toggle is needed.
      - uses: actions/configure-pages@v5
        with:
          enablement: true
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
        with:
          # Ride out transient Pages/CDN hiccups instead of giving up after the
          # default 10 status-check errors — this step (never the build) was the
          # one that intermittently reported "try again later".
          timeout: 900000          # 15 min ceiling for a pending deployment
          error_count: 25          # tolerate more transient status errors
          reporting_interval: 10000 # poll every 10 s
