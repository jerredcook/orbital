<!-- Source artwork for the app (PWA) icons in public/icons/.  Navy space, an
     amber tilted orbit, a grey world, a glowing satellite — the motif is kept
     inside the maskable safe zone (centre ~80%) so Android's circle/squircle
     masks never clip it.  Rasterize to PNG (192/512 + a 512 maskable copy, plus
     a 180 apple-touch-icon and a 32 favicon) with any SVG→PNG tool. -->
<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="42%" r="78%">
      <stop offset="0%" stop-color="#0e1c30"/>
      <stop offset="60%" stop-color="#081120"/>
      <stop offset="100%" stop-color="#04070e"/>
    </radialGradient>
    <radialGradient id="planet" cx="38%" cy="34%" r="78%">
      <stop offset="0%" stop-color="#5b6b86"/>
      <stop offset="55%" stop-color="#3a4860"/>
      <stop offset="100%" stop-color="#222d40"/>
    </radialGradient>
    <linearGradient id="ring" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFC676"/>
      <stop offset="100%" stop-color="#F39A2E"/>
    </linearGradient>
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="7" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" fill="url(#bg)"/>
  <g fill="#ffffff">
    <circle cx="150" cy="150" r="2.6" opacity="0.55"/>
    <circle cx="384" cy="176" r="2.1" opacity="0.5"/>
    <circle cx="360" cy="356" r="2.6" opacity="0.5"/>
    <circle cx="168" cy="360" r="1.9" opacity="0.45"/>
  </g>
  <g transform="rotate(-24 256 256)">
    <ellipse cx="256" cy="256" rx="168" ry="74" fill="none" stroke="url(#ring)" stroke-width="11"/>
  </g>
  <circle cx="256" cy="256" r="62" fill="url(#planet)"/>
  <circle cx="240" cy="240" r="62" fill="none" stroke="#FFB454" stroke-width="2" opacity="0.18"/>
  <g transform="rotate(-24 256 256)">
    <circle cx="424" cy="256" r="16" fill="#FFE0B0" filter="url(#glow)"/>
  </g>
</svg>
